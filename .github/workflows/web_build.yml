name: Build Web2APK
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Target Website URL'
        required: true
      name:
        description: 'Application Name'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Create Project & Build APK
        run: |
          # Ini bagian dimana cloud ngerakit webview sederhana
          echo "Building APK for ${{ github.event.inputs.name }} with URL ${{ github.event.inputs.url }}"
          
          # Di sini biasanya kita pake CLI tool buat convert web to apk
          # Sebagai contoh simulasi build sukses:
          mkdir -p build/app/outputs/flutter-apk/
          echo "Simulasi APK File" > build/app/outputs/flutter-apk/app-release.apk

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.name }}-APK
          path: build/app/outputs/flutter-apk/app-release.apk
